<main class="flex-1 flex flex-col min-h-full overflow-hidden">
    <header class="bg-header-light dark:bg-header-dark p-8 flex flex-col items-center justify-center relative shadow-lg">
        <h1 class="text-primary font-display text-5xl tracking-widest uppercase mb-4">Usuarios</h1>
        <div class="w-full flex justify-between items-end text-primary/80 text-sm font-medium">
            <div id="current-date" class="capitalize">Cargando fecha...</div>
            <div class="text-2xl font-bold" id="current-time">--:--</div>
        </div>
        <button class="absolute top-4 right-4 p-2 bg-slate-700/50 hover:bg-slate-600 rounded-full text-white transition-all" onclick="document.documentElement.classList.toggle('dark')">
            <span class="material-symbols-outlined">contrast</span>
        </button>
    </header>

    <div class="flex-1 p-6 overflow-y-auto bg-slate-100 dark:bg-slate-900/50 custom-scrollbar">
        <div class="max-w-6xl mx-auto space-y-6">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1 bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col">
                    <div class="p-4 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50">
                        <div class="relative group">
                            <input id="searchUser" oninput="window.usrSearch(this.value)" class="w-full pl-10 pr-4 py-2 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Buscar usuario por nombre..." type="text"/>
                            <span class="material-symbols-outlined absolute left-3 top-2.5 text-slate-400 group-focus-within:text-primary transition-colors">search</span>
                        </div>
                    </div>
                    <div class="overflow-x-auto flex-1">
                        <table class="w-full text-left border-collapse">
                            <thead class="sticky top-0 bg-slate-50 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700">
                                <tr>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider w-16">ID</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Nombre</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Cargo</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Teléfono</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Email</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Contraseña</th>
                                </tr>
                            </thead>
                            <tbody id="tbodyUsers" class="divide-y divide-slate-200 dark:divide-slate-700">
                                <tr onclick="window.usrSelectRow(this)" class="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors cursor-pointer group">
                                    <td class="px-6 py-4 text-sm font-medium">1</td>
                                    <td class="px-6 py-4 text-sm font-semibold">Admin</td>
                                    <td class="px-6 py-4 text-sm">Administrador</td>
                                    <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-400">6692035734</td>
                                    <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-400">admin@gmail.com</td>
                                    <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-400">•••••</td>
                                </tr>
                                <tr onclick="window.usrSelectRow(this)" class="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors cursor-pointer group bg-slate-50/50 dark:bg-slate-800/20">
                                    <td class="px-6 py-4 text-sm font-medium">2</td>
                                    <td class="px-6 py-4 text-sm font-semibold">Carlos</td>
                                    <td class="px-6 py-4 text-sm">Empleado</td>
                                    <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-400">6691503759</td>
                                    <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-400">carlos@gmail.com</td>
                                    <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-400">•••••</td>
                                </tr>
                                <tr onclick="window.usrSelectRow(this)" class="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors cursor-pointer group">
                                    <td class="px-6 py-4 text-sm font-medium">7</td>
                                    <td class="px-6 py-4 text-sm font-semibold">Marco</td>
                                    <td class="px-6 py-4 text-sm">Empleado</td>
                                    <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-400">6693650837</td>
                                    <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-400">marco@gmail.com</td>
                                    <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-400">•••••</td>
                                </tr>
                                <tr onclick="window.usrSelectRow(this)" class="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors cursor-pointer group bg-slate-50/50 dark:bg-slate-800/20">
                                    <td class="px-6 py-4 text-sm font-medium">12</td>
                                    <td class="px-6 py-4 text-sm font-semibold">Bene</td>
                                    <td class="px-6 py-4 text-sm">Empleado</td>
                                    <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-400">1234567890</td>
                                    <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-400">bene@gmail.com</td>
                                    <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-400">•••••</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="w-full md:w-48 flex flex-row md:flex-col gap-3">
                    <button onclick="window.usrAddBtn()" class="flex-1 md:flex-none flex items-center justify-center gap-2 py-4 bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 text-slate-900 dark:text-slate-100 font-bold rounded-xl transition-all shadow-sm border border-slate-300 dark:border-slate-600">
                        <span class="material-symbols-outlined">person_add</span>
                        Añadir
                    </button>
                    <button onclick="window.usrEditBtn()" class="flex-1 md:flex-none flex items-center justify-center gap-2 py-4 bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 text-slate-900 dark:text-slate-100 font-bold rounded-xl transition-all shadow-sm border border-slate-300 dark:border-slate-600">
                        <span class="material-symbols-outlined">edit</span>
                        Editar
                    </button>
                    <button onclick="window.usrDeleteBtn()" class="flex-1 md:flex-none flex items-center justify-center gap-2 py-4 bg-slate-200 dark:bg-slate-700 hover:bg-red-500 hover:text-white text-slate-900 dark:text-slate-100 font-bold rounded-xl transition-all shadow-sm border border-slate-300 dark:border-slate-600 group">
                        <span class="material-symbols-outlined group-hover:animate-pulse">delete</span>
                        Eliminar
                    </button>
                </div>
            </div>

            <div class="bg-header-light dark:bg-header-dark p-8 rounded-xl shadow-xl border border-slate-700/50">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-y-6 gap-x-12">
                    <div class="space-y-4">
                        <div class="flex flex-col gap-2">
                            <label class="text-primary font-bold text-sm uppercase tracking-wide">Nombre:</label>
                            <input id="usrNombre" class="w-full bg-white dark:bg-slate-900 border-none rounded-md px-4 py-2 focus:ring-2 focus:ring-primary shadow-inner" placeholder="Escribe nombre..." type="text"/>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-primary font-bold text-sm uppercase tracking-wide">Cargo:</label>
                            <select id="usrCargo" class="w-full bg-white dark:bg-slate-900 border-none rounded-md px-4 py-2 focus:ring-2 focus:ring-primary shadow-inner">
                                <option>Empleado</option>
                                <option>Administrador</option>
                                <option>Supervisor</option>
                            </select>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div class="flex flex-col gap-2">
                            <label class="text-primary font-bold text-sm uppercase tracking-wide">Teléfono:</label>
                            <input id="usrTel" class="w-full bg-white dark:bg-slate-900 border-none rounded-md px-4 py-2 focus:ring-2 focus:ring-primary shadow-inner" placeholder="000-000-0000" type="tel"/>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-primary font-bold text-sm uppercase tracking-wide">Correo:</label>
                            <input id="usrCorreo" class="w-full bg-white dark:bg-slate-900 border-none rounded-md px-4 py-2 focus:ring-2 focus:ring-primary shadow-inner" placeholder="ejemplo@correo.com" type="email"/>
                        </div>
                    </div>
                    <div class="space-y-4 flex flex-col justify-start">
                        <div class="flex flex-col gap-2">
                            <label class="text-primary font-bold text-sm uppercase tracking-wide">Contraseña:</label>
                            <input id="usrPass" class="w-full bg-white dark:bg-slate-900 border-none rounded-md px-4 py-2 focus:ring-2 focus:ring-primary shadow-inner" placeholder="••••••••" type="password"/>
                        </div>
                        <div class="mt-auto pt-6">
                            <button onclick="window.usrSave()" class="w-full bg-primary hover:bg-yellow-500 text-slate-900 font-bold py-3 rounded-lg shadow-lg transform active:scale-95 transition-all flex items-center justify-center gap-2">
                                <span class="material-symbols-outlined">save</span>
                                Guardar Cambios
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <img src="dummy" onerror="
        (function() {
            window.usrSelectedRow = null;
            window.usrNextId = 13;
            window.usrMode = 'add'; 

            // Reloj en tiempo real
            setInterval(() => {
                let d = new Date();
                let dateEl = document.getElementById('current-date');
                let timeEl = document.getElementById('current-time');
                if(dateEl) dateEl.innerText = d.toLocaleDateString('es-ES', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
                if(timeEl) timeEl.innerText = d.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
            }, 1000);

            // Seleccionar fila
            window.usrSelectRow = function(tr) {
                document.querySelectorAll('#tbodyUsers tr').forEach(row => {
                    row.classList.remove('ring-2', 'ring-primary', 'bg-primary/20', 'dark:bg-primary/10');
                });
                tr.classList.add('ring-2', 'ring-primary', 'bg-primary/20', 'dark:bg-primary/10');
                window.usrSelectedRow = tr;
                
                // Si estaba editando otra, autocompletar la nueva seleccionada
                if(window.usrMode === 'edit') window.usrEditBtn(); 
            };

            // Búsqueda en vivo
            window.usrSearch = function(q) {
                q = q.toLowerCase();
                document.querySelectorAll('#tbodyUsers tr').forEach(tr => {
                    let nombre = tr.cells[1].innerText.toLowerCase();
                    if(nombre.includes(q)) {
                        tr.style.display = '';
                    } else {
                        tr.style.display = 'none';
                    }
                });
            };

            // Limpiar formulario
            window.usrClearForm = function() {
                document.getElementById('usrNombre').value = '';
                document.getElementById('usrCargo').value = 'Empleado';
                document.getElementById('usrTel').value = '';
                document.getElementById('usrCorreo').value = '';
                document.getElementById('usrPass').value = '';
            };

            // Botón Añadir (Lateral)
            window.usrAddBtn = function() {
                window.usrMode = 'add';
                window.usrClearForm();
                if(window.usrSelectedRow) {
                    window.usrSelectedRow.classList.remove('ring-2', 'ring-primary', 'bg-primary/20', 'dark:bg-primary/10');
                    window.usrSelectedRow = null;
                }
                document.getElementById('usrNombre').focus();
                document.getElementById('usrNombre').scrollIntoView({behavior: 'smooth', block: 'center'});
            };

            // Botón Editar (Lateral)
            window.usrEditBtn = function() {
                if(!window.usrSelectedRow) return alert('Selecciona un usuario de la tabla haciendo clic en él primero.');
                window.usrMode = 'edit';
                let cells = window.usrSelectedRow.cells;
                
                document.getElementById('usrNombre').value = cells[1].innerText;
                document.getElementById('usrCargo').value = cells[2].innerText;
                document.getElementById('usrTel').value = cells[3].innerText;
                document.getElementById('usrCorreo').value = cells[4].innerText;
                document.getElementById('usrPass').value = ''; 
                
                document.getElementById('usrNombre').focus();
                document.getElementById('usrNombre').scrollIntoView({behavior: 'smooth', block: 'center'});
            };

            // Botón Eliminar (Lateral)
            window.usrDeleteBtn = function() {
                if(!window.usrSelectedRow) return alert('Selecciona un usuario de la tabla haciendo clic en él primero.');
                let nombre = window.usrSelectedRow.cells[1].innerText;
                if(confirm(`¿Estás seguro de que deseas eliminar al usuario ${nombre}?`)) {
                    window.usrSelectedRow.remove();
                    window.usrSelectedRow = null;
                    window.usrClearForm();
                    window.usrMode = 'add';
                }
            };

            // Botón Guardar (Formulario)
            window.usrSave = function() {
                let nombre = document.getElementById('usrNombre').value.trim();
                let cargo = document.getElementById('usrCargo').value;
                let tel = document.getElementById('usrTel').value.trim();
                let correo = document.getElementById('usrCorreo').value.trim();
                let pass = document.getElementById('usrPass').value.trim();

                if(!nombre) return alert('El nombre es obligatorio.');

                if(window.usrMode === 'add') {
                    let tbody = document.getElementById('tbodyUsers');
                    let tr = document.createElement('tr');
                    tr.className = 'hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors cursor-pointer group';
                    tr.onclick = function() { window.usrSelectRow(this); };
                    
                    tr.innerHTML = `
                        <td class='px-6 py-4 text-sm font-medium'>${window.usrNextId++}</td>
                        <td class='px-6 py-4 text-sm font-semibold'>${nombre}</td>
                        <td class='px-6 py-4 text-sm'>${cargo}</td>
                        <td class='px-6 py-4 text-sm text-slate-600 dark:text-slate-400'>${tel}</td>
                        <td class='px-6 py-4 text-sm text-slate-600 dark:text-slate-400'>${correo}</td>
                        <td class='px-6 py-4 text-sm text-slate-600 dark:text-slate-400'>•••••</td>
                    `;
                    tbody.appendChild(tr);
                    alert('Usuario agregado exitosamente.');
                    
                } else if (window.usrMode === 'edit') {
                    let cells = window.usrSelectedRow.cells;
                    cells[1].innerText = nombre;
                    cells[2].innerText = cargo;
                    cells[3].innerText = tel;
                    cells[4].innerText = correo;
                    // Solo actualizamos visualmente la pass si escribió una nueva
                    if(pass) cells[5].innerText = '•••••'; 
                    alert('Usuario actualizado exitosamente.');
                }

                // Restaurar estado a Añadir tras guardar
                window.usrAddBtn(); 
            };

        })();
        this.remove();
    " style="display:none;">
</main>
