<!-- iniciar.module.html (módulo LOGIN) -->
<div class="w-full max-w-[460px]">
  <div class="text-center mb-8">
    <div class="bg-primary text-slate-900 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-yellow-500/10">
      <span class="material-icons-round text-4xl">inventory_2</span>
    </div>
    <h1 class="text-3xl font-bold text-slate-900 dark:text-white">Smart Inventory</h1>
    <p class="text-slate-500 dark:text-slate-400 mt-2">Inicia sesión para continuar</p>
  </div>

  <div class="bg-white/90 dark:bg-slate-900/60 backdrop-blur rounded-2xl shadow-xl border border-slate-200/70 dark:border-slate-700/60 overflow-hidden">
    <div class="h-2 bg-primary"></div>

    <div class="p-7 md:p-8">
      <div class="flex items-start justify-between gap-4 mb-6">
        <div>
          <h2 class="text-xl font-semibold text-slate-900 dark:text-white">Iniciar sesión</h2>
          <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Accede con tu usuario y contraseña</p>
        </div>

        <button type="button"
          class="shrink-0 p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition"
          onclick="document.documentElement.classList.toggle('dark')"
          title="Cambiar tema">
          <span class="material-icons-round text-slate-700 dark:text-slate-200">contrast</span>
        </button>
      </div>

      <div id="loginError" class="hidden mb-4 rounded-xl border border-red-200 bg-red-50 text-red-700 px-4 py-3 text-sm dark:border-red-900/50 dark:bg-red-900/20 dark:text-red-200">
        Escribe usuario y contraseña para ingresar.
      </div>

      <form class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5" for="identity">
            Usuario o correo
          </label>
          <div class="relative">
            <span class="material-icons-round absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
            <input
              id="identity"
              type="text"
              placeholder="admin@ejemplo.com"
              class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition"
            />
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="password">
              Contraseña
            </label>
            <a class="text-xs font-semibold text-slate-600 dark:text-slate-300 hover:underline" href="javascript:void(0)">
              ¿Olvidaste tu contraseña?
            </a>
          </div>

          <div class="relative">
            <span class="material-icons-round absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
            <input
              id="password"
              type="password"
              placeholder="••••••••"
              class="w-full pl-11 pr-12 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition"
            />
            <button type="button"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 dark:hover:text-slate-200"
              onclick="
                const p=document.getElementById('password');
                p.type = (p.type==='password') ? 'text' : 'password';
                this.querySelector('span').textContent = (p.type==='password') ? 'visibility' : 'visibility_off';
              "
              title="Mostrar/Ocultar">
              <span class="material-icons-round text-xl">visibility</span>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between">
          <label class="inline-flex items-center gap-2 text-sm text-slate-600 dark:text-slate-300">
            <input type="checkbox" class="rounded border-slate-300 dark:border-slate-600 text-primary focus:ring-primary" />
            Recordarme
          </label>
          <span class="text-xs text-slate-400 dark:text-slate-500">Demo</span>
        </div>

        <button
          type="submit"
          class="w-full bg-primary text-slate-900 font-bold py-3 rounded-xl hover:brightness-105 transition shadow-sm">
          Entrar
        </button>

        <p class="text-center text-xs text-slate-500 dark:text-slate-400">
          Al entrar aceptas el uso interno del sistema.
        </p>
      </form>
    </div>
  </div>

  <p class="text-center text-xs text-slate-400 dark:text-slate-500 mt-6">
    © 2026 Smart Inventory
  </p>
</div>
